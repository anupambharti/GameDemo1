<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#63b8ff">
  <title>Pixel Plumber - Mobile Platform Game</title>
  <style>
    :root {
      color-scheme: light;
      --control-size: clamp(58px, 16vw, 78px);
      --control-gap: clamp(10px, 3vw, 18px);
      --panel: rgba(19, 28, 38, 0.74);
      --panel-strong: rgba(12, 18, 26, 0.9);
      --accent: #f6c84c;
      --ink: #f8fbff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #63b8ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #gameShell {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) calc(104px + env(safe-area-inset-bottom));
      background:
        linear-gradient(#63b8ff 0%, #8ed8ff 58%, #9de889 58%, #69bd68 100%);
      overflow: hidden;
    }

    #stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #63b8ff;
    }

    #hud {
      position: absolute;
      top: max(10px, env(safe-area-inset-top));
      left: 10px;
      right: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
      color: var(--ink);
      font: 700 clamp(12px, 2.8vw, 15px) / 1.1 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.35);
    }

    #hud span {
      min-width: 0;
      white-space: nowrap;
    }

    #restart {
      position: absolute;
      top: max(42px, calc(env(safe-area-inset-top) + 38px));
      right: 10px;
      z-index: 4;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--panel);
      color: var(--ink);
      font: 800 22px / 1 system-ui, sans-serif;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.24), 0 8px 24px rgba(0, 0, 0, 0.16);
    }

    #restart:active,
    .touchButton:active,
    .touchButton.is-down,
    .menu button:active {
      transform: translateY(2px);
      box-shadow: inset 0 2px 0 rgba(0, 0, 0, 0.22);
    }

    #touchControls {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--control-gap);
      padding: 10px max(14px, env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      background:
        linear-gradient(180deg, rgba(22, 34, 44, 0.12), rgba(14, 23, 32, 0.72)),
        rgba(71, 111, 97, 0.22);
    }

    .pad,
    .actions {
      display: flex;
      align-items: center;
      gap: var(--control-gap);
    }

    .touchButton {
      width: var(--control-size);
      height: var(--control-size);
      border: 0;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--panel);
      color: var(--ink);
      font: 900 clamp(22px, 7vw, 34px) / 1 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.22), 0 10px 28px rgba(0, 0, 0, 0.18);
      cursor: pointer;
    }

    .actions .touchButton {
      border-radius: 50%;
      background: linear-gradient(#f06c54, #ba3d3b);
      color: #fff8e9;
    }

    .actions .touchButton:first-child {
      background: linear-gradient(#5eb9e8, #277ca8);
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: grid;
      place-items: center;
      padding: 22px;
      background: linear-gradient(rgba(74, 165, 220, 0.36), rgba(25, 41, 57, 0.32));
      color: var(--ink);
      text-align: center;
    }

    #overlay[hidden] {
      display: none;
    }

    .menu {
      width: min(92vw, 380px);
      padding: 22px;
      border-radius: 8px;
      background: var(--panel-strong);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .menu h1 {
      margin: 0 0 10px;
      color: #fff7d6;
      font: 900 clamp(26px, 8vw, 42px) / 0.95 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      letter-spacing: 0;
      text-shadow: 0 4px 0 rgba(0, 0, 0, 0.35);
    }

    .menu p {
      margin: 0 0 18px;
      color: #dbeefb;
      font-size: clamp(13px, 3.4vw, 16px);
      line-height: 1.35;
    }

    .menu button {
      width: min(240px, 100%);
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(#ffd95c, #f1a72e);
      color: #33220b;
      font: 900 18px / 1 system-ui, sans-serif;
      box-shadow: inset 0 -4px 0 rgba(105, 64, 0, 0.26), 0 10px 28px rgba(0, 0, 0, 0.25);
      cursor: pointer;
    }

    @media (min-width: 900px) {
      #gameShell {
        grid-template-rows: minmax(0, 1fr) 96px;
      }

      #touchControls {
        justify-content: center;
      }

      .pad {
        margin-right: 140px;
      }
    }

    @media (max-height: 430px) and (orientation: landscape) {
      #gameShell {
        grid-template-rows: minmax(0, 1fr) calc(82px + env(safe-area-inset-bottom));
      }

      :root {
        --control-size: clamp(52px, 12vw, 64px);
      }

      #restart {
        top: max(10px, env(safe-area-inset-top));
      }

      .menu {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main id="gameShell" aria-label="Pixel platform game">
    <section id="stage">
      <canvas id="gameCanvas" width="320" height="180" aria-label="Game screen"></canvas>
      <div id="hud">
        <span id="scoreText">000000</span>
        <span id="coinText">COINS 00</span>
        <span id="timeText">TIME 240</span>
      </div>
      <button id="restart" type="button" aria-label="Restart" title="Restart">&#8635;</button>
      <div id="overlay">
        <div class="menu">
          <h1 id="overlayTitle">Anu Plumber</h1>
          <p id="overlayCopy">A tiny first-stage platform run made for phones.</p>
          <button id="playButton" type="button">Play</button>
        </div>
      </div>
    </section>

    <nav id="touchControls" aria-label="Touch controls">
      <div class="pad">
        <button class="touchButton" type="button" data-key="left" aria-label="Left" title="Left">&#9664;</button>
        <button class="touchButton" type="button" data-key="right" aria-label="Right" title="Right">&#9654;</button>
      </div>
      <div class="actions">
        <button class="touchButton" type="button" data-key="run" aria-label="Run" title="Run">B</button>
        <button class="touchButton" type="button" data-key="jump" aria-label="Jump" title="Jump">A</button>
      </div>
    </nav>
  </main>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d", { alpha: false });
      const scoreText = document.getElementById("scoreText");
      const coinText = document.getElementById("coinText");
      const timeText = document.getElementById("timeText");
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayCopy = document.getElementById("overlayCopy");
      const playButton = document.getElementById("playButton");
      const restartButton = document.getElementById("restart");

      const VIEW_W = 320;
      const VIEW_H = 180;
      const TILE = 16;
      const MAP_W = 220;
      const MAP_H = 12;
      const WORLD_W = MAP_W * TILE;
      const WORLD_H = MAP_H * TILE;
      const GRAVITY = 0.36;
      const MAX_FALL = 7.2;
      const SOLID = new Set(["G", "B", "Q", "U", "T", "I", "S"]);

      ctx.imageSmoothingEnabled = false;

      let map;
      let coins;
      let enemies;
      let particles;
      let bumps;
      let floaters;
      let cameraX = 0;
      let score = 0;
      let coinCount = 0;
      let timeLeft = 240;
      let state = "ready";
      let lastTs = 0;
      let accumulator = 0;
      let levelClock = 0;
      let gameOverTimer = 0;
      let audioCtx = null;

      const input = {
        left: false,
        right: false,
        jump: false,
        run: false,
        jumpWasDown: false,
        jumpBuffer: 0
      };

      const player = {
        x: 42,
        y: 112,
        w: 12,
        h: 22,
        vx: 0,
        vy: 0,
        facing: 1,
        onGround: false,
        coyote: 0,
        hurt: 0
      };

      function makeMap() {
        const rows = Array.from({ length: MAP_H }, () => Array(MAP_W).fill("."));

        for (let x = 0; x < MAP_W; x += 1) {
          rows[10][x] = "G";
          rows[11][x] = "G";
        }

        [[36, 40], [71, 75], [113, 119], [156, 160]].forEach(([a, b]) => {
          for (let x = a; x <= b; x += 1) {
            rows[10][x] = ".";
            rows[11][x] = ".";
          }
        });

        const set = (x, y, tile) => {
          if (x >= 0 && x < MAP_W && y >= 0 && y < MAP_H) rows[y][x] = tile;
        };

        const line = (x1, x2, y, tile) => {
          for (let x = x1; x <= x2; x += 1) set(x, y, tile);
        };

        const pipe = (x, topRow, height) => {
          set(x, topRow, "T");
          set(x + 1, topRow, "T");
          for (let y = topRow + 1; y < topRow + height; y += 1) {
            set(x, y, "I");
            set(x + 1, y, "I");
          }
        };

        set(12, 7, "Q");
        set(16, 7, "B");
        set(17, 7, "Q");
        set(18, 7, "B");
        set(19, 7, "Q");
        set(23, 5, "Q");
        line(45, 52, 6, "B");
        set(49, 6, "Q");
        line(58, 63, 8, "B");
        set(61, 8, "Q");
        line(84, 88, 7, "B");
        set(86, 7, "Q");
        line(94, 102, 5, "B");
        set(98, 5, "Q");
        line(126, 131, 8, "B");
        set(130, 8, "Q");
        line(139, 146, 6, "B");
        line(169, 174, 8, "B");
        set(172, 8, "Q");

        pipe(31, 8, 2);
        pipe(66, 7, 3);
        pipe(107, 8, 2);
        pipe(150, 7, 3);

        for (let i = 0; i < 5; i += 1) {
          for (let y = 9 - i; y <= 9; y += 1) set(187 + i, y, "S");
        }
        for (let i = 0; i < 4; i += 1) {
          for (let y = 6 + i; y <= 9; y += 1) set(196 + i, y, "S");
        }

        return rows;
      }

      function addCoin(tileX, tileY) {
        coins.push({
          x: tileX * TILE + 8,
          y: tileY * TILE + 8,
          r: 4,
          taken: false,
          spin: Math.random() * Math.PI * 2
        });
      }

      function addCoinArc(startX, startY, count) {
        for (let i = 0; i < count; i += 1) {
          const lift = Math.abs(i - (count - 1) / 2);
          addCoin(startX + i, startY - Math.floor(2 - lift * 0.7));
        }
      }

      function addEnemy(tileX, tileY, speed) {
        enemies.push({
          x: tileX * TILE,
          y: tileY * TILE,
          w: 14,
          h: 14,
          vx: speed || -0.45,
          vy: 0,
          dead: false,
          squash: 0
        });
      }

      function resetLevel(playNow) {
        map = makeMap();
        coins = [];
        enemies = [];
        particles = [];
        bumps = [];
        floaters = [];
        cameraX = 0;
        score = 0;
        coinCount = 0;
        timeLeft = 240;
        levelClock = 0;
        gameOverTimer = 0;
        Object.assign(player, {
          x: 42,
          y: 112,
          w: 12,
          h: 22,
          vx: 0,
          vy: 0,
          facing: 1,
          onGround: false,
          coyote: 0,
          hurt: 0
        });

        addCoinArc(7, 6, 5);
        addCoinArc(37, 6, 6);
        addCoinArc(72, 5, 5);
        addCoinArc(114, 5, 6);
        addCoinArc(157, 5, 5);
        [57, 58, 59, 60, 61, 62, 94, 95, 96, 97, 98, 99, 126, 127, 128, 129, 139, 140, 141, 142, 169, 170, 171].forEach((x) => {
          addCoin(x, 4 + ((x % 3) === 0 ? 1 : 0));
        });

        addEnemy(25, 9, -0.42);
        addEnemy(54, 9, -0.46);
        addEnemy(80, 9, -0.48);
        addEnemy(102, 9, -0.42);
        addEnemy(134, 9, -0.5);
        addEnemy(178, 9, -0.46);

        input.left = false;
        input.right = false;
        input.jump = false;
        input.run = false;
        input.jumpWasDown = false;
        input.jumpBuffer = 0;
        state = playNow ? "playing" : "ready";
        updateHud();
      }

      function getTile(tx, ty) {
        if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return ".";
        return map[ty][tx];
      }

      function setTile(tx, ty, value) {
        if (tx >= 0 && tx < MAP_W && ty >= 0 && ty < MAP_H) map[ty][tx] = value;
      }

      function isSolid(tx, ty) {
        return SOLID.has(getTile(tx, ty));
      }

      function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function playTone(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const notes = {
          coin: [988, 1318, 0.07],
          jump: [330, 420, 0.09],
          stomp: [180, 90, 0.12],
          bump: [160, 130, 0.08],
          clear: [523, 1046, 0.22],
          hurt: [160, 70, 0.18]
        }[type] || [440, 440, 0.06];

        osc.type = "square";
        osc.frequency.setValueAtTime(notes[0], now);
        osc.frequency.exponentialRampToValueAtTime(Math.max(40, notes[1]), now + notes[2]);
        gain.gain.setValueAtTime(0.055, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + notes[2]);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + notes[2] + 0.02);
      }

      function unlockAudio() {
        if (!audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) audioCtx = new AudioContext();
        }
        if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
      }

      function spawnFloating(text, x, y) {
        floaters.push({ text, x, y, life: 46 });
      }

      function spawnDust(x, y, color, amount) {
        for (let i = 0; i < amount; i += 1) {
          particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 1.5,
            vy: -Math.random() * 1.4,
            life: 20 + Math.random() * 15,
            color
          });
        }
      }

      function collectCoin(x, y, fromBlock) {
        coinCount += 1;
        score += fromBlock ? 100 : 50;
        spawnFloating(fromBlock ? "100" : "50", x - 5, y - 10);
        particles.push({ x, y, vx: 0, vy: -1.2, life: 28, color: "#ffd952", coin: true });
        playTone("coin");
        updateHud();
      }

      function hitBlock(tx, ty) {
        const tile = getTile(tx, ty);
        if (tile !== "Q" && tile !== "B") return;

        bumps.push({ tx, ty, t: 12 });
        if (tile === "Q") {
          setTile(tx, ty, "U");
          collectCoin(tx * TILE + 8, ty * TILE, true);
        } else {
          playTone("bump");
          spawnDust(tx * TILE + 8, ty * TILE + 8, "#c96b45", 4);
        }
      }

      function updateHud() {
        scoreText.textContent = String(score).padStart(6, "0");
        coinText.textContent = "COINS " + String(coinCount).padStart(2, "0");
        timeText.textContent = "TIME " + Math.max(0, Math.ceil(timeLeft));
      }

      function showOverlay(title, copy, buttonText) {
        overlayTitle.textContent = title;
        overlayCopy.textContent = copy;
        playButton.textContent = buttonText;
        overlay.hidden = false;
      }

      function hideOverlay() {
        overlay.hidden = true;
      }

      function startGame() {
        unlockAudio();
        if (state === "win" || state === "dead") {
          resetLevel(true);
        } else {
          state = "playing";
        }
        hideOverlay();
      }

      function killPlayer() {
        if (state !== "playing" || player.hurt > 0) return;
        state = "dead";
        gameOverTimer = 80;
        player.vx = 0;
        player.vy = -5.6;
        player.hurt = 90;
        playTone("hurt");
      }

      function clearLevel() {
        if (state !== "playing") return;
        state = "win";
        score += Math.ceil(timeLeft) * 10;
        updateHud();
        playTone("clear");
        showOverlay("Course Clear", "Coins " + coinCount + "   Score " + String(score).padStart(6, "0"), "Again");
      }

      function resolvePlayerX() {
        if (player.vx > 0) {
          const tx = Math.floor((player.x + player.w) / TILE);
          const top = Math.floor((player.y + 1) / TILE);
          const bottom = Math.floor((player.y + player.h - 1) / TILE);
          for (let ty = top; ty <= bottom; ty += 1) {
            if (isSolid(tx, ty)) {
              player.x = tx * TILE - player.w - 0.01;
              player.vx = 0;
              return;
            }
          }
        } else if (player.vx < 0) {
          const tx = Math.floor(player.x / TILE);
          const top = Math.floor((player.y + 1) / TILE);
          const bottom = Math.floor((player.y + player.h - 1) / TILE);
          for (let ty = top; ty <= bottom; ty += 1) {
            if (isSolid(tx, ty)) {
              player.x = (tx + 1) * TILE + 0.01;
              player.vx = 0;
              return;
            }
          }
        }
      }

      function resolvePlayerY() {
        if (player.vy > 0) {
          const ty = Math.floor((player.y + player.h) / TILE);
          const left = Math.floor((player.x + 1) / TILE);
          const right = Math.floor((player.x + player.w - 1) / TILE);
          for (let tx = left; tx <= right; tx += 1) {
            if (isSolid(tx, ty)) {
              player.y = ty * TILE - player.h - 0.01;
              player.vy = 0;
              player.onGround = true;
              player.coyote = 7;
              return;
            }
          }
        } else if (player.vy < 0) {
          const ty = Math.floor(player.y / TILE);
          const left = Math.floor((player.x + 1) / TILE);
          const right = Math.floor((player.x + player.w - 1) / TILE);
          for (let tx = left; tx <= right; tx += 1) {
            if (isSolid(tx, ty)) {
              player.y = (ty + 1) * TILE;
              player.vy = 0;
              hitBlock(tx, ty);
              return;
            }
          }
        }
      }

      function moveEnemy(enemy) {
        if (enemy.dead) {
          enemy.squash -= 1;
          return;
        }

        if (enemy.x < cameraX - 80 || enemy.x > cameraX + VIEW_W + 160) return;

        enemy.vy = Math.min(MAX_FALL, enemy.vy + GRAVITY);
        enemy.x += enemy.vx;

        const sideX = enemy.vx > 0 ? Math.floor((enemy.x + enemy.w) / TILE) : Math.floor(enemy.x / TILE);
        const top = Math.floor((enemy.y + 2) / TILE);
        const bottom = Math.floor((enemy.y + enemy.h - 1) / TILE);
        for (let ty = top; ty <= bottom; ty += 1) {
          if (isSolid(sideX, ty)) {
            enemy.x = enemy.vx > 0 ? sideX * TILE - enemy.w - 0.01 : (sideX + 1) * TILE + 0.01;
            enemy.vx *= -1;
            break;
          }
        }

        const frontTile = enemy.vx > 0 ? Math.floor((enemy.x + enemy.w + 2) / TILE) : Math.floor((enemy.x - 2) / TILE);
        const footTile = Math.floor((enemy.y + enemy.h + 2) / TILE);
        if (!isSolid(frontTile, footTile) && enemy.y > 40) enemy.vx *= -1;

        enemy.y += enemy.vy;
        const floorY = Math.floor((enemy.y + enemy.h) / TILE);
        const left = Math.floor((enemy.x + 1) / TILE);
        const right = Math.floor((enemy.x + enemy.w - 1) / TILE);
        for (let tx = left; tx <= right; tx += 1) {
          if (isSolid(tx, floorY)) {
            enemy.y = floorY * TILE - enemy.h - 0.01;
            enemy.vy = 0;
            break;
          }
        }

        if (enemy.y > WORLD_H + 60) enemy.dead = true;
      }

      function stompEnemy(enemy) {
        enemy.dead = true;
        enemy.squash = 26;
        player.vy = -5.4;
        score += 200;
        spawnFloating("200", enemy.x + 2, enemy.y - 8);
        spawnDust(enemy.x + enemy.w / 2, enemy.y + enemy.h, "#e9d08e", 7);
        playTone("stomp");
        updateHud();
      }

      function updatePlaying() {
        levelClock += 1 / 60;
        timeLeft -= 1 / 60;
        if (timeLeft <= 0) killPlayer();

        const jumpDown = input.jump;
        if (jumpDown && !input.jumpWasDown) input.jumpBuffer = 8;
        input.jumpWasDown = jumpDown;
        if (input.jumpBuffer > 0) input.jumpBuffer -= 1;
        if (player.coyote > 0) player.coyote -= 1;

        const accel = player.onGround ? 0.22 : 0.15;
        const maxSpeed = input.run ? 2.45 : 1.72;
        if (input.left) {
          player.vx -= accel;
          player.facing = -1;
        }
        if (input.right) {
          player.vx += accel;
          player.facing = 1;
        }
        if (!input.left && !input.right) {
          player.vx *= player.onGround ? 0.76 : 0.94;
          if (Math.abs(player.vx) < 0.025) player.vx = 0;
        }
        player.vx = Math.max(-maxSpeed, Math.min(maxSpeed, player.vx));

        if (input.jumpBuffer > 0 && (player.onGround || player.coyote > 0)) {
          player.vy = input.run ? -7.4 : -6.95;
          player.onGround = false;
          player.coyote = 0;
          input.jumpBuffer = 0;
          playTone("jump");
        }
        if (!input.jump && player.vy < -2.2) player.vy *= 0.91;

        player.vy = Math.min(MAX_FALL, player.vy + GRAVITY);
        player.onGround = false;
        player.x += player.vx;
        resolvePlayerX();
        player.y += player.vy;
        resolvePlayerY();

        player.x = Math.max(0, Math.min(WORLD_W - player.w, player.x));

        for (const enemy of enemies) moveEnemy(enemy);

        for (const coin of coins) {
          if (coin.taken) continue;
          coin.spin += 0.14;
          if (rectsOverlap(player, { x: coin.x - 5, y: coin.y - 5, w: 10, h: 10 })) {
            coin.taken = true;
            collectCoin(coin.x, coin.y, false);
          }
        }

        for (const enemy of enemies) {
          if (enemy.dead || enemy.squash <= -40) continue;
          if (!rectsOverlap(player, enemy)) continue;
          const playerFeet = player.y + player.h;
          const stomp = player.vy > 0.4 && playerFeet - enemy.y < 12;
          if (stomp) stompEnemy(enemy);
          else killPlayer();
        }

        if (player.y > VIEW_H + 56) killPlayer();
        if (player.x > 205 * TILE) clearLevel();

        updateEffects();
        updateCamera();
        updateHud();
      }

      function updateDead() {
        player.vy = Math.min(MAX_FALL, player.vy + GRAVITY);
        player.y += player.vy;
        gameOverTimer -= 1;
        updateEffects();
        updateCamera();
        if (gameOverTimer <= 0) {
          showOverlay("Try Again", "Score " + String(score).padStart(6, "0"), "Restart");
        }
      }

      function updateEffects() {
        for (const b of bumps) b.t -= 1;
        bumps = bumps.filter((b) => b.t > 0);

        for (const p of particles) {
          p.x += p.vx || 0;
          p.y += p.vy || 0;
          p.vy = (p.vy || 0) + 0.06;
          p.life -= 1;
        }
        particles = particles.filter((p) => p.life > 0);

        for (const f of floaters) {
          f.y -= 0.35;
          f.life -= 1;
        }
        floaters = floaters.filter((f) => f.life > 0);
      }

      function updateCamera() {
        const target = Math.max(0, Math.min(WORLD_W - VIEW_W, player.x - VIEW_W * 0.38));
        cameraX += (target - cameraX) * 0.12;
      }

      function step(ts) {
        if (!lastTs) lastTs = ts;
        const delta = Math.min(0.05, (ts - lastTs) / 1000);
        lastTs = ts;
        accumulator += delta;

        while (accumulator >= 1 / 60) {
          if (state === "playing") updatePlaying();
          else if (state === "dead") updateDead();
          else {
            updateEffects();
            updateCamera();
          }
          accumulator -= 1 / 60;
        }

        render();
        requestAnimationFrame(step);
      }

      function drawRect(x, y, w, h, color) {
        ctx.fillStyle = color;
        ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
      }

      function drawCloud(x, y) {
        x -= cameraX * 0.28;
        while (x < -80) x += 620;
        drawRect(x, y + 8, 46, 12, "#ffffff");
        drawRect(x + 8, y, 16, 12, "#ffffff");
        drawRect(x + 24, y + 3, 18, 10, "#ffffff");
        drawRect(x + 2, y + 15, 38, 4, "#dff6ff");
      }

      function drawBackdrops() {
        drawRect(0, 0, VIEW_W, VIEW_H, "#63b8ff");
        drawCloud(42, 27);
        drawCloud(250, 50);
        drawCloud(470, 24);
        drawCloud(790, 45);

        const hillBase = 156;
        for (let i = -1; i < 9; i += 1) {
          const x = i * 128 - (cameraX * 0.18 % 128);
          drawRect(x + 12, hillBase - 24, 42, 24, "#6fc96f");
          drawRect(x, hillBase - 12, 68, 12, "#54ad5c");
          drawRect(x + 22, hillBase - 19, 5, 5, "#9be48d");
        }

        for (let i = -1; i < 12; i += 1) {
          const x = i * 88 - (cameraX * 0.35 % 88);
          drawRect(x + 8, 145, 42, 10, "#4ba456");
          drawRect(x + 13, 139, 7, 8, "#5fc96a");
          drawRect(x + 25, 136, 8, 11, "#5fc96a");
          drawRect(x + 37, 140, 7, 7, "#5fc96a");
        }
      }

      function bumpOffset(tx, ty) {
        const b = bumps.find((item) => item.tx === tx && item.ty === ty);
        if (!b) return 0;
        const t = b.t / 12;
        return -Math.sin(t * Math.PI) * 5;
      }

      function drawTile(tile, sx, sy, tx, ty) {
        if (tile === "G" || tile === "S") {
          const top = getTile(tx, ty - 1) === ".";
          drawRect(sx, sy, TILE, TILE, tile === "S" ? "#a95f38" : "#9b6034");
          if (top) drawRect(sx, sy, TILE, 4, "#49a94e");
          drawRect(sx + 2, sy + 5, 5, 3, "#c48955");
          drawRect(sx + 11, sy + 10, 4, 3, "#754120");
          drawRect(sx, sy + 15, TILE, 1, "rgba(0,0,0,0.2)");
          return;
        }

        if (tile === "B") {
          drawRect(sx, sy, TILE, TILE, "#c76345");
          drawRect(sx, sy, TILE, 2, "#ef9b6a");
          drawRect(sx, sy + 7, TILE, 2, "#7f392d");
          drawRect(sx + 7, sy, 2, 7, "#7f392d");
          drawRect(sx + 2, sy + 9, 2, 7, "#7f392d");
          drawRect(sx + 12, sy + 9, 2, 7, "#7f392d");
          return;
        }

        if (tile === "Q") {
          drawRect(sx, sy, TILE, TILE, "#f2bd35");
          drawRect(sx + 2, sy + 2, 12, 12, "#ffd95c");
          drawRect(sx, sy + 13, TILE, 3, "#a96d17");
          drawRect(sx + 7, sy + 4, 2, 2, "#6a4212");
          drawRect(sx + 9, sy + 6, 2, 4, "#6a4212");
          drawRect(sx + 7, sy + 11, 2, 2, "#6a4212");
          return;
        }

        if (tile === "U") {
          drawRect(sx, sy, TILE, TILE, "#b68b42");
          drawRect(sx + 2, sy + 2, 12, 12, "#8d6a35");
          drawRect(sx, sy + 14, TILE, 2, "#67471f");
          return;
        }

        if (tile === "T" || tile === "I") {
          drawRect(sx, sy, TILE, TILE, "#1d934d");
          drawRect(sx + 2, sy, 5, TILE, "#54cc74");
          drawRect(sx + 11, sy, 3, TILE, "#0f5d34");
          if (tile === "T") {
            drawRect(sx - 1, sy, TILE + 2, 5, "#62d681");
            drawRect(sx - 1, sy + 5, TILE + 2, 2, "#0f5d34");
          }
        }
      }

      function drawCoin(coin) {
        const sx = coin.x - cameraX;
        const width = Math.max(2, Math.abs(Math.cos(coin.spin)) * 7);
        drawRect(sx - width / 2, coin.y - 5, width, 10, "#ffe064");
        drawRect(sx - 1, coin.y - 3, 2, 6, "#b67a18");
      }

      function drawEnemy(enemy) {
        const sx = enemy.x - cameraX;
        const sy = enemy.y;
        if (enemy.dead) {
          if (enemy.squash > -8) {
            drawRect(sx + 1, sy + 8, 12, 5, "#7b5335");
            drawRect(sx + 3, sy + 5, 8, 5, "#a97749");
          }
          return;
        }
        drawRect(sx + 1, sy + 5, 12, 8, "#9c6a3d");
        drawRect(sx + 3, sy + 1, 8, 7, "#c38b52");
        drawRect(sx + 3, sy + 8, 2, 2, "#161616");
        drawRect(sx + 9, sy + 8, 2, 2, "#161616");
        drawRect(sx + 1, sy + 13, 4, 2, "#2c1d16");
        drawRect(sx + 9, sy + 13, 4, 2, "#2c1d16");
      }

      function drawPlayer() {
        const sx = player.x - cameraX;
        const sy = player.y;
        const flip = player.facing < 0;
        const blink = player.hurt > 0 && Math.floor(player.hurt / 4) % 2 === 0;
        if (blink) return;

        const px = (n) => sx + (flip ? player.w - n : n);
        drawRect(px(2), sy + 1, 9, 4, "#26445f");
        drawRect(px(0), sy + 5, 12, 3, "#26445f");
        drawRect(px(2), sy + 8, 8, 5, "#e3a66d");
        drawRect(px(7), sy + 9, 2, 2, "#1b1b1b");
        drawRect(px(1), sy + 12, 10, 3, "#3b2a21");
        drawRect(px(2), sy + 14, 8, 5, "#d44f3f");
        drawRect(px(4), sy + 14, 4, 8, "#28a7a5");
        drawRect(px(1), sy + 20, 4, 2, "#2f221d");
        drawRect(px(8), sy + 20, 4, 2, "#2f221d");
        if (!player.onGround) {
          drawRect(px(0), sy + 16, 3, 3, "#e3a66d");
          drawRect(px(9), sy + 15, 3, 3, "#e3a66d");
        } else if (Math.abs(player.vx) > 0.15 && Math.floor(levelClock * 12) % 2) {
          drawRect(px(0), sy + 20, 4, 2, "#2f221d");
          drawRect(px(9), sy + 18, 3, 2, "#2f221d");
        }
      }

      function drawGoal() {
        const poleX = 205 * TILE - cameraX;
        drawRect(poleX, 42, 3, 118, "#f7f7e8");
        drawRect(poleX - 2, 40, 7, 4, "#ffe064");
        drawRect(poleX + 3, 48, 32, 18, "#e84845");
        drawRect(poleX + 7, 52, 16, 4, "#fff1ce");
        drawRect(poleX + 7, 59, 10, 3, "#fff1ce");
      }

      function drawTiles() {
        const startX = Math.max(0, Math.floor(cameraX / TILE) - 1);
        const endX = Math.min(MAP_W - 1, Math.floor((cameraX + VIEW_W) / TILE) + 1);
        for (let ty = 0; ty < MAP_H; ty += 1) {
          for (let tx = startX; tx <= endX; tx += 1) {
            const tile = getTile(tx, ty);
            if (tile === ".") continue;
            const sx = tx * TILE - cameraX;
            const sy = ty * TILE + bumpOffset(tx, ty);
            drawTile(tile, sx, sy, tx, ty);
          }
        }
      }

      function drawParticles() {
        for (const p of particles) {
          const sx = p.x - cameraX;
          if (p.coin) {
            drawRect(sx - 3, p.y - 4, 6, 8, "#ffe064");
            drawRect(sx - 1, p.y - 2, 2, 4, "#ad7518");
          } else {
            drawRect(sx, p.y, 2, 2, p.color || "#ffffff");
          }
        }
      }

      function drawFloaters() {
        ctx.font = "8px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
        ctx.textAlign = "left";
        ctx.fillStyle = "#fff4b8";
        ctx.strokeStyle = "rgba(0,0,0,0.45)";
        ctx.lineWidth = 2;
        for (const f of floaters) {
          const sx = Math.round(f.x - cameraX);
          const sy = Math.round(f.y);
          ctx.strokeText(f.text, sx, sy);
          ctx.fillText(f.text, sx, sy);
        }
      }

      function render() {
        ctx.save();
        ctx.imageSmoothingEnabled = false;
        drawBackdrops();
        drawGoal();
        drawTiles();
        for (const coin of coins) {
          if (!coin.taken && coin.x > cameraX - 20 && coin.x < cameraX + VIEW_W + 20) drawCoin(coin);
        }
        for (const enemy of enemies) {
          if (enemy.x > cameraX - 30 && enemy.x < cameraX + VIEW_W + 30) drawEnemy(enemy);
        }
        drawParticles();
        drawPlayer();
        drawFloaters();

        if (state === "ready") {
          ctx.fillStyle = "rgba(255,255,255,0.13)";
          for (let y = 0; y < VIEW_H; y += 4) ctx.fillRect(0, y, VIEW_W, 1);
        }
        ctx.restore();
      }

      function setInput(key, down) {
        if (key in input) input[key] = down;
      }

      window.addEventListener("keydown", (event) => {
        const key = event.key;
        if (["ArrowLeft", "ArrowRight", "ArrowUp", " ", "Spacebar", "a", "A", "d", "D", "w", "W", "Shift"].includes(key)) {
          event.preventDefault();
        }
        if (key === "ArrowLeft" || key === "a" || key === "A") setInput("left", true);
        if (key === "ArrowRight" || key === "d" || key === "D") setInput("right", true);
        if (key === "ArrowUp" || key === "w" || key === "W" || key === " " || key === "Spacebar") setInput("jump", true);
        if (key === "Shift") setInput("run", true);
        if ((key === "Enter" || key === " ") && state !== "playing") startGame();
      }, { passive: false });

      window.addEventListener("keyup", (event) => {
        const key = event.key;
        if (key === "ArrowLeft" || key === "a" || key === "A") setInput("left", false);
        if (key === "ArrowRight" || key === "d" || key === "D") setInput("right", false);
        if (key === "ArrowUp" || key === "w" || key === "W" || key === " " || key === "Spacebar") setInput("jump", false);
        if (key === "Shift") setInput("run", false);
      });

      document.querySelectorAll(".touchButton").forEach((button) => {
        const key = button.dataset.key;
        const down = (event) => {
          event.preventDefault();
          unlockAudio();
          button.classList.add("is-down");
          button.setPointerCapture?.(event.pointerId);
          setInput(key, true);
          if (state !== "playing") startGame();
        };
        const up = (event) => {
          event.preventDefault();
          button.classList.remove("is-down");
          setInput(key, false);
        };
        button.addEventListener("pointerdown", down, { passive: false });
        button.addEventListener("pointerup", up, { passive: false });
        button.addEventListener("pointercancel", up, { passive: false });
        button.addEventListener("lostpointercapture", () => {
          button.classList.remove("is-down");
          setInput(key, false);
        });
      });

      playButton.addEventListener("click", startGame);
      restartButton.addEventListener("click", () => {
        unlockAudio();
        resetLevel(true);
        hideOverlay();
      });

      canvas.addEventListener("pointerdown", () => {
        unlockAudio();
        if (state !== "playing") startGame();
      });

      window.addEventListener("blur", () => {
        input.left = false;
        input.right = false;
        input.jump = false;
        input.run = false;
        document.querySelectorAll(".touchButton").forEach((button) => button.classList.remove("is-down"));
      });

      resetLevel(false);
      requestAnimationFrame(step);
    })();
  </script>
</body>
</html>
